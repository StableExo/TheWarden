name: Deploy FlashSwapV3 Contract #14

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: false
        default: 'base'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile contracts
        run: npx hardhat compile --force
      
      - name: Deploy Contract #14 via UserOp
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CDP_PAYMASTER_URL: ${{ secrets.CDP_PAYMASTER_URL }}
          CHAINSTACK_HTTPS: ${{ secrets.BASE_RPC_URL }}
        run: npx tsx scripts/deploy-multi-router.ts
      
      - name: Report deployment
        if: success()
        run: echo "Contract #14 deployed successfully to ${{ github.event.inputs.network || 'base' }}!"
